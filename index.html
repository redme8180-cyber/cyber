<!DOCTYPE html> 
<html lang="fr"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Hôtel Pro - Réservation</title> 
    <style> 
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --primary: #10b981; --danger: #ef4444; --accent: #3b82f6; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; max-width: 500px; margin: auto; } 
        .hotel-header { text-align: center; margin-bottom: 20px; }
        #logo-header { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; } 
        .room-rect { background: var(--card); height: 90px; border-radius: 12px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: transform 0.2s; } 
        .room-busy { opacity: 0.6; cursor: not-allowed; background: #f1f5f9; }
        .triangle { position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 25px 25px 0; border-radius: 0 10px 0 0; } 
        .tri-free { border-color: transparent var(--primary) transparent transparent; } 
        .tri-busy { border-color: transparent var(--danger) transparent transparent; } 
        #res-form-container { display: none; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--accent); margin-top: 20px; } 
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; } 
        .btn-res { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .price-summary { background: #e0f2fe; padding: 10px; border-radius: 10px; margin: 10px 0; text-align: center; font-weight: bold; color: #0369a1; }
    </style> 
</head> 
<body> 

    <div class="hotel-header">
        <img id="logo-header" src="https://via.placeholder.com/70" alt="Logo">
        <h2 id="hotel-name">Mon Hôtel</h2>
        <div id="source-badge" style="font-size: 9px; color: gray;">Connexion...</div>
    </div>
 
    <div id="room-grid" class="grid-container">
        <p style="text-align:center; width:100%;">Chargement des chambres...</p>
    </div> 
 
    <div id="res-form-container"> 
        <h3 id="res-title" style="margin:0; color:var(--accent);">Chambre</h3> 
        <label style="font-size:11px;">Arrivée</label><input type="date" id="date-arrivee" onchange="calculerTotal()">
        <label style="font-size:11px;">Départ</label><input type="date" id="date-depart" onchange="calculerTotal()">
        <div id="prix-total" class="price-summary">Sélectionnez vos dates</div>
        <input type="text" id="client-name" placeholder="Votre Nom"> 
        <input type="tel" id="client-tel" placeholder="WhatsApp"> 
        <button class="btn-res" onclick="validerReservation()">RESERVER VIA WHATSAPP</button> 
        <button onclick="document.getElementById('res-form-container').style.display='none'" style="background:none; border:none; color:gray; font-size:12px; cursor:pointer;">Annuler</button>
    </div> 

    <script> 
        // --- CONFIGURATION ---
        const WHATSAPP_NUM = "212661731123"; 
        const GOOGLE_CSV_URL = "TON_LIEN_GOOGLE_SHEETS_CSV"; // Source 1 (Priorité)
        const GITHUB_CSV_URL = "TON_LIEN_GITHUB_RAW_CSV";   // Source 2 (Sécurité)

        let chambres = []; 
        let selectedRoom = null;

        async function chargerDonnees() { 
            try { 
                // Tentative 1 : Google Sheets
                const response = await fetch(GOOGLE_CSV_URL); 
                if (!response.ok) throw new Error();
                const data = await response.text(); 
                document.getElementById('source-badge').innerText = "SOURCE: GOOGLE SHEETS (LIVE)";
                traiterDonnees(data);
            } catch (e) { 
                // Tentative 2 : GitHub (si Google échoue)
                try {
                    const response = await fetch(GITHUB_CSV_URL);
                    const data = await response.text();
                    document.getElementById('source-badge').innerText = "SOURCE: GITHUB (SÉCURITÉ)";
                    traiterDonnees(data);
                } catch (err) {
                    document.getElementById('room-grid').innerHTML = "Erreur de connexion.";
                }
            } 
        } 

        function traiterDonnees(csv) {
            const lignes = csv.split('\n').slice(1); 
            chambres = lignes.filter(l => l.trim() !== "").map(l => { 
                const c = l.split(','); 
                return { id: c[0].trim(), prix: parseFloat(c[1]), etat: c[2].trim().toLowerCase() }; 
            }); 
            render(); 
        }

        function render() { 
            const grid = document.getElementById('room-grid'); 
            grid.innerHTML = ""; 
            chambres.forEach(c => { 
                const isOccupied = c.etat === 'occupe' || c.etat === 'occupé'; 
                const box = document.createElement('div'); 
                box.className = `room-rect ${isOccupied ? 'room-busy' : ''}`; 
                if(!isOccupied) box.onclick = () => ouvrirForm(c); 
                box.innerHTML = `<div class="triangle ${isOccupied ? 'tri-busy' : 'tri-free'}"></div><strong>#${c.id}</strong><span>${c.prix} DH</span>`; 
                grid.appendChild(box); 
            }); 
        } 

        function ouvrirForm(room) {
            selectedRoom = room;
            document.getElementById('res-form-container').style.display = 'block';
            document.getElementById('res-title').innerText = "Chambre #" + room.id;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-arrivee').value = today;
            document.getElementById('date-arrivee').min = today;
            document.getElementById('date-depart').min = today;
        }

        function calculerTotal() {
            const d1 = new Date(document.getElementById('date-arrivee').value);
            const d2 = new Date(document.getElementById('date-depart').value);
            if (d1 && d2 && d2 > d1) {
                const diffDays = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)); 
                const total = diffDays * selectedRoom.prix;
                document.getElementById('prix-total').innerText = `${diffDays} nuits = ${total} DH`;
                return { days: diffDays, total: total };
            }
            document.getElementById('prix-total').innerText = "Dates invalides";
            return null;
        }

        function validerReservation() { 
            const info = calculerTotal();
            const nom = document.getElementById('client-name').value;
            if(!nom || !info) return alert("Remplissez tous les champs");
            const msg = `*Réservation Chambre #${selectedRoom.id}*\n👤 Nom: ${nom}\n📅 Durée: ${info.days} nuits\n💰 Total: ${info.total} DH`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`); 
        } 

        chargerDonnees(); 
        setInterval(chargerDonnees, 60000); // Rafraîchit toutes les minutes
    </script> 
</body> 
</html>
