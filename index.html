<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LocPro Pirate</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285F4">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #1a1a1a; }
        #map { height: 100%; width: 100%; }
        .controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.8);
            padding: 12px; border-radius: 50px; z-index: 2000; width: 90%; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; color: white; transition: 0.2s;
        }
        .btn:active { transform: scale(0.8); }
        .btn-save { background: #28a745; }
        .btn-photo { background: #6f42c1; }
        .btn-wa { background: #25D366; }
        .btn-pdf { background: #dc3545; }
        .btn-reset { background: #ffc107; color: black; }
        .btn-center { background: #4285F4; }
        #photo-input { display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <button class="btn btn-center" onclick="recenter()">📍</button>
        <button class="btn btn-save" onclick="savePosition()">💾</button>
        <label class="btn btn-photo">📷<input type="file" id="photo-input" accept="image/*" capture="environment"></label>
        <button class="btn btn-wa" onclick="sendWA()">💬</button>
        <button class="btn btn-pdf" onclick="generatePDF()">📄</button>
        <button class="btn btn-reset" onclick="resetApp()">♻️</button>
    </div>

    <script>
        let map, marker, accuracyCircle;
        let isFollowing = true;
        let savedPoints = JSON.parse(localStorage.getItem('points')) || [];
        let mapMarkers = [];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17, center: { lat: 48.8566, lng: 2.3522 }, disableDefaultUI: true
            });
            map.addListener("dragstart", () => isFollowing = false);
            displaySavedPoints();
            startTracking();
        }

        function displaySavedPoints() {
            savedPoints.forEach(p => addRedMarker(p.lat, p.lng, p.time));
        }

        function addRedMarker(lat, lng, time) {
            const m = new google.maps.Marker({
                position: { lat, lng }, map: map,
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: "#FF0000", fillOpacity: 1, strokeColor: "white", strokeWeight: 2 }
            });
            mapMarkers.push(m);
        }

        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    if (!marker) {
                        marker = new google.maps.Marker({ position: coords, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: "#4285F4", fillOpacity: 1, strokeColor: "white", strokeWeight: 2 }});
                    } else { marker.setPosition(coords); }
                    if (isFollowing) map.panTo(coords);
                }, null, { enableHighAccuracy: true });
            }
        }

        function savePosition() {
            if (!marker) return;
            const pos = marker.getPosition();
            const time = new Date().toLocaleTimeString();
            const newP = { lat: pos.lat(), lng: pos.lng(), time: time };
            savedPoints.push(newP);
            localStorage.setItem('points', JSON.stringify(savedPoints));
            addRedMarker(newP.lat, newP.lng, newP.time);
        }

        function sendWA() {
            if (!marker) return;
            const p = marker.getPosition();
            window.open(`https://wa.me/?text=Ma%20Position:%20https://maps.google.com/?q=${p.lat()},${p.lng()}`);
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Rapport LocPro - Pirate Edition", 10, 10);
            savedPoints.forEach((p, i) => doc.text(`${i+1}. ${p.time} -> Lat: ${p.lat.toFixed(5)} Lng: ${p.lng.toFixed(5)}`, 10, 20+(i*10)));
            doc.save("rapport.pdf");
        }

        function resetApp() {
            if (confirm("Reset total ?")) {
                mapMarkers.forEach(m => m.setMap(null));
                localStorage.clear();
                savedPoints = [];
                location.reload();
            }
        }

        function recenter() { isFollowing = true; if(marker) map.panTo(marker.getPosition()); }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=SANS_CLE&callback=initMap" async defer></script>
</body>
</html>
